# TaskForge Configuration
# Copy this file to config.yaml and modify as needed

# API Configuration
api:
  # Set your API key here or use OPENAI_API_KEY environment variable
  key: ""
  base_url: ""
  model: ""
  max_tokens: 100000
  retry_attempts: 3
  retry_delay: 1.0

# Agent Configuration
agent:
  max_history_messages: 50
  max_subagent_iterations: 20
  command_timeout: 60

# Workspace Configuration
# TaskForge reads/writes and runs tools inside this project directory.
# Leave empty to use the directory where TaskForge is started.
workspace:
  path: ""

# Logging Configuration
logging:
  level: "INFO"
  format: "json"  # "json" or "text"
  file: "agent.log"

# Security Configuration
security:
  enable_path_validation: true
  allowed_commands: []  # Empty means all non-blocked commands allowed

# Web Server Configuration
server:
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["*"]  # 生产环境应限制具体域名

# Qdrant Configuration (used by auth user storage)
qdrant:
  qdrant_host: "localhost"
  qdrant_port: 6333

# Web Search Configuration (Tavily)
web_search:
  enabled: true
  api_key: ""  # 填入您的 Tavily API Key (https://tavily.com)
  max_results: 5
  search_depth: "basic"  # "basic" or "advanced"

# MCP Configuration (Model Context Protocol)
# MCP 配置通过前端管理，存储在 mcp_config.json 中
# 可在此预定义服务器（可选）
mcp:
  servers: {}  # 格式: {server-name: {command: "...", env: {}}}
